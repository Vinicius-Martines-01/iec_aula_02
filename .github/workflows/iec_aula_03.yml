name: CI/CD Aula 03

on:
  push:
    branches: [dev] 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Iniciar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run tests
        # O '|| true' evita que o workflow pare se a pasta tests/ ainda não existir
        run: pytest tests/ || echo "Pasta de testes não encontrada, pulando..."

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Testar o código manualmente
        # Garanta que o arquivo plus.py existe na raiz do projeto
        run: python plus.py 5 5

  deploy:
    runs-on: ubuntu-latest
    needs: test
    environment: production
    # This condition should also be updated to target the dev branch
    if: github.ref == 'refs/heads/dev' 
    steps:
      - name: Deploy to Server
        run: echo "Executar deploy agora que os testes passaram"

