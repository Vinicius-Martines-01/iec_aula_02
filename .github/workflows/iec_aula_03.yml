name: CI/CD Aula 03

on:
  push:
    branches: [dev] 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Iniciar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run tests
        run: pytest tests/ || echo "Pasta de testes não encontrada, pulando..."

      - name: Gerar artefato Zip
        run: zip -r plus-demo.zip . 

      - name: publicar artefato
        uses: actions/upload-artifact@v4 
        with: 
          name: codigo-buildado
          path: plus-demo.zip

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Baixar artefato
        uses: actions/download-artifact@v4 
        with: 
          name: codigo-buildado
      - name: Extrair arquivo
        run: unzip plus-demo.zip
      
      - name: Iniciar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Testar o código manualmente
        run: python plus.py 3 3 && python plus.py 4 4

  deploy:
    runs-on: ubuntu-latest
    needs: test
    environment: production
    if: github.ref == 'refs/heads/dev' 
    steps:
      - name: Deploy to Server
        run: echo "Executar deploy agora que os testes passaram"
