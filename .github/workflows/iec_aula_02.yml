name: CI/CD Aula 02

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Iniciar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run tests
        # O '|| true' evita que o workflow pare se a pasta tests/ ainda não existir
        run: pytest tests/ || echo "Pasta de testes não encontrada, pulando..."

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Testar o código manualmente
        # Garanta que o arquivo plus.py existe na raiz do projeto
        run: python plus.py 10 15

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Análise com SonarCloud
      uses: SonarSource/sonarcloud-github-action@v2
      with:
        args: >
          -Dsonar.projectKey=Vinicius-Martines-01_iec_aula_02
          -Dsonar.organization=Vinicius-Martines-01
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
